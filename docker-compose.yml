services:
  cadair-translate-service:
    build:
      context: .
    image: cadair-translate-service:local
    container_name: cadair-translate-service
    env_file:
      - .env
    environment:
      CADAIR_APP_ID: cadair_translate
      CADAIR_OUTPUT_ROOT: /data/deliveries/apps
      CADAIR_UPLOAD_ROOT: /data/uploads
      CADAIR_ALLOWED_INPUT_ROOTS: /data/uploads,/data/document-intelligence,/data/deliveries
      CADAIR_LOG_DIR: /data/deliveries/apps/cadair_translate/_logs
      CADAIR_ODA_RUNTIME_DIR: /tmp/runtime-cadair
      CADAIR_ODA_TIMEOUT_SECONDS: "120"
      ODA_PATH: /opt/oda/ODAFileConverter.AppImage
    ports:
      - "8030:8030"
    volumes:
      - ./data/uploads:/data/uploads:ro
      - ./data/document-intelligence:/data/document-intelligence:ro
      - ./data/deliveries:/data/deliveries:rw
      - ./config:/data/config:ro
      - ./secret/oda:/opt/oda:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8030/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
